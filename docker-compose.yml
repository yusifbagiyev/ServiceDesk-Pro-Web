# Local development infrastructure for the ServiceDesk web backend.
# Bring up with:  docker compose up -d
# The API connects to PostgreSQL directly in dev; PgBouncer mirrors the prod
# topology (transaction-mode pooling) and is available on 6432 if you want it.

services:
  postgres:
    image: postgres:17
    container_name: servicedesk-postgres
    environment:
      POSTGRES_USER: servicedesk
      POSTGRES_PASSWORD: servicedesk_dev_pw
      POSTGRES_DB: servicedesk
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicedesk -d servicedesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: servicedesk-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: servicedesk-pgbouncer
    environment:
      DB_USER: servicedesk
      DB_PASSWORD: servicedesk_dev_pw
      DB_HOST: postgres
      DB_NAME: servicedesk
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
